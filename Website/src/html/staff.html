<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EmpowerTrack — Enrolments & Funding</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <div id="header-placeholder"></div>

  <main class="container">
    <script src="../js/stephen/runQuery.js"></script>

    <section class="section">
      <h1 class="section__title">Staff</h1>
      <button id="runAllStaffButton" type="button" class="btn btn--primary">Toggle Query</button>
      <div class="table-wrapper">
        <div class="table-scroll">
          <div id="tableStaffOutput"></div>
        </div>
      </div>
      <script src="../js/stephen/ShowStaffTable.js"></script>
    </section>


    <section class="section">
      <h1 class="section__title">Teams</h1>
      <button id="runAllTeamButton" type="button" class="btn btn--primary">Toggle Query</button>
      <div class="table-wrapper">
        <div class="table-scroll">
          <div id="tableTeamOutput"></div>
        </div>
      </div>
      <script src="../js/stephen/ShowTeamTable.js"></script>
    </section>

    <hr>
    </hr>

    <h3>Staff per region</h3>
    <label for="regionFilter">Filter by Region:</label>
    <select id="regionFilter">
      <option value="">All Regions</option>
    </select>
    <div class="table-wrapper">
      <div class="table-scroll">
        <div id="outputStaff"></div>
      </div>
    </div>
    <script src="../js/stephen/StaffQuery.js"></script>

    <h3>Trainer Session Workload</h3>
    <button id="runTrainerButton" type="button" class="btn btn--primary">Toggle Query</button>
    <div class="table-wrapper">
      <div class="table-scroll">
        <div id="outputTrainer"></div>
      </div>
    </div>
    <script src="../js/stephen/StaffQuery2.js"></script>

    <h3>Uncertified Staff lessons</h3>
    <button id="runUncertifiedStaffButton" type="button" class="btn btn--primary">Toggle Query</button>
    <div class="table-wrapper">
      <div class="table-scroll">
        <div id="outputUncertifiedStaff"></div>
      </div>
    </div>
    <script src="../js/stephen/StaffQuery3.js"></script>

    <hr>
    </hr>

    <div id="tableOptions" class="section">
      <div id="add">
        <form id="formAdd">
          <h2>Add</h2>
          <div class="form-field">
            <label for="staffID">Staff ID</label>
            <input type="number" id="staffID">
          </div>

          <div class="form-field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName">
          </div>

          <div class="form-field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName">
          </div>

          <div class="form-field">
            <label for="email">Email</label>
            <input type="email" id="email">
          </div>

          <div class="form-field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone">
          </div>

          <div class="form-field">
            <label for="gender">Gender</label>
            <select id="gender" name="gender">
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Prefer not to say">Prefer not to say</option>
              <option value="Non-binary">Non-binary</option>
            </select>
          </div>

          <div class="form-field">
            <label for="role">Role</label>
            <select id="role" name="role">
              <option value="">Select</option>
              <option value="Trainer">Trainer</option>
              <option value="Volunteer">Volunteer</option>
              <option value="Coordinator">Coordinator</option>
            </select>
          </div>

          <div class="form-field">
            <label for="certifiedDate">Date Certified</label>
            <input type="date" id="certifiedDate">
          </div>

          <div class="form-field">
            <label for="isActive">Active</label>
            <select id="isActive" name="isActive">
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>

          <div class="form-field">
            <label for="teamID">Team ID</label>
            <input type="number" id="teamID">
          </div>

          <div class="form-field">
            <label for="regionID">Region ID</label>
            <input type="number" id="regionID">
          </div>

          <div class="form-field">
            <label for="createdAt">Created</label>
            <input type="datetime-local" id="createdAt">
          </div>

          <div class="form-field">
            <label for="updatedAt">Updated</label>
            <input type="datetime-local" id="updatedAt">
          </div>

          <button type="submit">Add Record</button>
        </form>

        <div id="outputAdd" class="messageAdd"></div>

      </div>

      <script src="../js/stephen/formJS.js"></script>
      <script>
        const showAddMessage = (text, type) => {
          const output = document.querySelector("#outputAdd");
          output.textContent = text;
          output.className = `messageAdd ${type}`;
        };

        document.querySelector("#formAdd").addEventListener("submit", async (event) => {
          event.preventDefault();

          const staff = {
            staffID: Number(document.querySelector("#staffID").value),
            firstName: document.querySelector("#firstName").value.trim(),
            lastName: document.querySelector("#lastName").value.trim(),
            email: document.querySelector("#email").value.trim(),
            phone: document.querySelector("#phone").value.trim(),
            gender: document.querySelector("#gender").value.trim(),
            role: document.querySelector("#role").value.trim(),
            certifiedDate: document.querySelector("#certifiedDate").value.trim(),
            isActive: Number(document.querySelector("#isActive").value),
            teamID: Number(document.querySelector("#teamID").value),
            regionID: Number(document.querySelector("#regionID").value),
            createdAt: document.querySelector("#createdAt").value.trim(),
            updatedAt: document.querySelector("#updatedAt").value.trim(),
          };

          const validationMessage = validateStaff(staff);
          if (validationMessage) {
            showAddMessage(validationMessage, "error");
            return;
          }

          const certifiedDateValue = staff.certifiedDate
            ? `'${escapeSql(staff.certifiedDate)}'`
            : 'NULL';
          const sql = `
          INSERT INTO tblStaff (staffID, firstName, lastName, email, phone, gender, role, certifiedDate, isActive, teamID, regionID, createdAt, updatedAt)
          VALUES (
            ${staff.staffID},
            '${escapeSql(staff.firstName)}',
            '${escapeSql(staff.lastName)}',
            '${escapeSql(staff.email)}',
            '${escapeSql(staff.phone)}',
            '${escapeSql(staff.gender)}',
            '${escapeSql(staff.role)}',
            ${certifiedDateValue},
            ${staff.isActive},
            ${staff.teamID},
            ${staff.regionID},
            '${escapeSql(staff.createdAt)}',
            '${escapeSql(staff.updatedAt)}'
          )
        `;

          const result = await runFormQuery(sql);
          const form = document.querySelector("#formAdd");

          if (result && result.success) {
            showAddMessage("Staff record added successfully.", "success");
            form.reset();
            return;
          }

          if (result && result.error) {
            showAddMessage(result.error, "error");
          } else {
            showAddMessage("Unable to add the record.", "error");
          }
        });
      </script>

      <div id="edit">
        <form id="formEdit">
          <h2>Edit</h2>
          <div class="form-field">
            <label for="staffID">Staff ID</label>
            <input type="number" id="staffIDEdit">
          </div>

          <div class="form-field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstNameEdit">
          </div>

          <div class="form-field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastNameEdit">
          </div>

          <div class="form-field">
            <label for="email">Email</label>

          </div>

          <div class="form-field">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phoneEdit">
          </div>

          <div class="form-field">
            <label for="gender">Gender</label>
            <select id="genderEdit" name="gender">
              <option value="">Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Prefer not to say">Prefer not to say</option>
              <option value="Non-binary">Non-binary</option>
            </select>
          </div>

          <div class="form-field">
            <label for="role">Role</label>
            <select id="roleEdit" name="role">
              <option value="">Select</option>
              <option value="Trainer">Trainer</option>
              <option value="Volunteer">Volunteer</option>
              <option value="Coordinator">Coordinator</option>
            </select>
          </div>

          <div class="form-field">
            <label for="certifiedDate">Date Certified</label>
            <input type="date" id="certifiedDateEdit">
          </div>

          <div class="form-field">
            <label for="isActive">Active</label>
            <select id="isActiveEdit" name="isActive">
              <option value="1">Yes</option>
              <option value="0">No</option>
            </select>
          </div>

          <div class="form-field">
            <label for="teamID">Team ID</label>
            <input type="number" id="teamIDEdit">
          </div>

          <div class="form-field">
            <label for="regionID">Region ID</label>
            <input type="number" id="regionIDEdit">
          </div>

          <div class="form-field">
            <label for="createdAt">Created</label>
            <input type="datetime-local" id="createdAtEdit">
          </div>

          <div class="form-field">
            <label for="updatedAt">Updated</label>
            <input type="datetime-local" id="updatedAtEdit">
          </div>

          <button type="submit">Edit Record</button>
        </form>

        <button onclick="toggleEditButton()">Toggle Tabular Report Visability</button>
        <script>
          function toggleEditButton() {
            const outputTable = document.getElementById("tableOutput");
            if (outputTable.style.display === "none") {
              outputTable.style.display = "block";
            } else {
              outputTable.style.display = "none";
            }
          }
        </script>

        <div id="message"></div>
        <div id="selectedStaffText"></div>
        <div id="tableOutput"></div>
        <script src="../js/stephen/EditDeleteForm.js"></script>
      </div>

      <div style="display: flex; justify-content: center;">
        <canvas id="myChart" width="400" height="400"></canvas>
      </div>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <script src="../js/stephen/pieChart.js"></script>
  </main>

  <div id="footer-placeholder"></div>

  <script src="../js/loadComponents.js"></script>
  <script src="../js/main.js"></script>

</html>
